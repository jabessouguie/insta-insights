<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <title>Hors ligne — InstaInsights</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #111c1b;
      color: #cfcbba;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      text-align: center;
    }
    .icon-wrap {
      width: 72px; height: 72px;
      background: rgba(255,217,83,0.1);
      border: 1px solid rgba(255,217,83,0.2);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    svg { width: 36px; height: 36px; }
    h1 { font-size: 1.75rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    p { font-size: 0.95rem; color: rgba(207,203,186,0.6); max-width: 360px; line-height: 1.6; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #ffd953; color: #111c1b;
      font-weight: 700; font-size: 0.875rem;
      padding: 12px 24px; border-radius: 12px;
      border: none; cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .footer { font-size: 0.75rem; color: rgba(207,203,186,0.3); margin-top: 8px; }
  </style>
</head>

  <div class="icon-wrap">
