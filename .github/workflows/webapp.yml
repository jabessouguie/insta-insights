name: InstaInsights Webapp CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "webapp/**"
      - ".github/workflows/webapp.yml"
  pull_request:
    branches: [main]
    paths:
      - "webapp/**"

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: webapp

jobs:
  # ─── Security: Secret Scanning ───────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for trufflehog

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: HEAD
          extra_args: --debug --only-verified

  # ─── Quality: Lint + Type-check ──────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ─── Security: Dependency Audit ──────────────────────────────────────────────
  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true # Don't fail on moderate issues

      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true

  # ─── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --coverage --passWithNoTests

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: webapp/coverage/
          retention-days: 7

  # ─── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    env:
      # Use dummy values for build validation (no real API calls during build)
      GEMINI_API_KEY: "dummy_key_for_build_validation"
      NEXT_PUBLIC_APP_NAME: "InstaInsights"
      NEXT_PUBLIC_APP_URL: "https://example.com"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: webapp/.next/
          retention-days: 1

  # ─── Lighthouse Performance ──────────────────────────────────────────────────
  # Uncomment and configure when deployed to a real URL
  # lighthouse:
  #   name: Lighthouse Audit
  #   runs-on: ubuntu-latest
  #   needs: [build]
  #   steps:
  #     - uses: treosh/lighthouse-ci-action@v11
  #       with:
  #         urls: "https://your-preview-url.vercel.app"
  #         budgetPath: webapp/.lighthouse-budget.json

  # ─── Deploy (main branch only) ───────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [secret-scan, build, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Uncomment and configure for Vercel deployment:
      # - name: Deploy to Vercel
      #   run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment placeholder
        run: echo "✅ Build validated. Configure VERCEL_TOKEN secret to enable auto-deploy."
